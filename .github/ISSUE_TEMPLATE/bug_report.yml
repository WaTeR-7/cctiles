name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `cctiles ...`
        2. ...
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: cctiles version
      description: Output of `cctiles --version`
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS / terminal
      placeholder: e.g. Ubuntu 22.04, Windows Terminal
    validations:
      required: false
